server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback for client-side routes (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed static assets, no cache for index.html.
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
